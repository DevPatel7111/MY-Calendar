<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Calendar Sync — Daily Routine Planner</title>

<style>
:root {
  --bg: #0d0d0f;
  --surface: #161618;
  --surface2: #1e1e21;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --accent: #5b8ef0;
  --accent2: #3fd6a0;
  --accent3: #f06b5b;
  --text: #f0eeea;
  --muted: #888884;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

header {
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 1.1rem;
  font-weight: 700;
}

.logo span {
  color: var(--accent);
}

.auth-status {
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--muted);
}

.dot.live {
  background: var(--accent2);
}

main {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.section {
  margin-bottom: 2rem;
}

h2 {
  font-size: 0.7rem;
  font-family: var(--mono);
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
}

input[type="text"],
input[type="date"],
input[type="time"],
select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: 0.82rem;
  padding: 9px 12px;
  width: 100%;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
}

.btn-accent {
  background: var(--accent);
  color: white;
}

.btn-ghost {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}

.btn-danger {
  background: transparent;
  color: var(--accent3);
  border: 1px solid rgba(240,107,91,0.3);
}

.btn-green {
  background: var(--accent2);
  color: #08120d;
}

.gap8 {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.hidden {
  display: none !important;
}

.row-head {
  display: grid;
  grid-template-columns: 2.5fr 1.2fr 1fr 1fr 1.3fr 36px;
  gap: 8px;
  margin-bottom: 8px;
}

.row-head span {
  font-family: var(--mono);
  font-size: 0.67rem;
  color: var(--muted);
}

.event-row {
  display: grid;
  grid-template-columns: 2.5fr 1.2fr 1fr 1fr 1.3fr 36px;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.result-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  margin-bottom: 6px;
}

.result-title {
  flex: 1;
}

.badge {
  font-size: 0.72rem;
  padding: 4px 8px;
  border-radius: 20px;
}

.badge-ok {
  background: rgba(63,214,160,0.12);
  color: var(--accent2);
}

.badge-fail {
  background: rgba(240,107,91,0.12);
  color: var(--accent3);
}

.progress-wrap {
  background: var(--surface2);
  border-radius: 4px;
  height: 4px;
  overflow: hidden;
  margin: 12px 0;
}

.progress-fill {
  height: 100%;
  background: var(--accent2);
  width: 0%;
}

.stats {
  display: flex;
  gap: 12px;
  margin-bottom: 1rem;
}

.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
}

@media (max-width: 640px) {
  .event-row,
  .row-head {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">cal<span>sync</span></div>

  <div class="auth-status">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">not connected</span>
  </div>
</header>

<main>

<div class="section">
  <h2>01 — Setup</h2>

  <div class="setup-card">

    <input
      type="text"
      id="client-id"
      placeholder="Google OAuth Client ID"
      style="margin-bottom:14px;"
    />

    <div class="gap8">
      <button class="btn btn-accent" onclick="signIn()">
        Connect Google Account
      </button>

      <button
        class="btn btn-ghost hidden"
        id="btn-signout"
        onclick="signOut()">
        Sign out
      </button>
    </div>

    <div id="auth-msg" style="margin-top:10px;"></div>

  </div>
</div>

<!-- QUICK ACCESS -->
<div class="section hidden" id="section-quick">

  <h2>02 — Quick access</h2>

  <div class="setup-card">

    <div class="gap8">

      <button class="btn btn-ghost" onclick="quickAddGym()">
        🏋 Gym
      </button>

      <button class="btn btn-ghost" onclick="quickAddStandup()">
        💼 Standup
      </button>

      <button class="btn btn-ghost" onclick="quickAddStudy()">
        📚 Study
      </button>

      <button class="btn btn-ghost" onclick="quickAddLunch()">
        🍱 Lunch
      </button>

      <button class="btn btn-ghost" onclick="quickAddSleep()">
        🌙 Sleep
      </button>

      <button class="btn btn-accent" onclick="generateWorkday()">
        ⚡ Generate Workday
      </button>

    </div>

  </div>
</div>

<!-- EVENTS -->
<div class="section hidden" id="section-events">

  <h2>03 — Your events</h2>

  <div class="setup-card">

    <div class="row-head">
      <span>Title</span>
      <span>Date</span>
      <span>Start</span>
      <span>End</span>
      <span>Repeat</span>
      <span></span>
    </div>

    <div id="rows"></div>

    <div class="gap8" style="margin-top:1rem;">
      <button class="btn btn-ghost" onclick="addRow()">
        + Add Row
      </button>

      <button class="btn btn-green" onclick="pushToCalendar()">
        Push To Calendar
      </button>
    </div>

  </div>
</div>

<!-- RESULTS -->
<div class="section hidden" id="section-results">

  <h2>04 — Results</h2>

  <div class="stats">
    <div class="stat">Total: <span id="s-total">0</span></div>
    <div class="stat">Added: <span id="s-ok">0</span></div>
    <div class="stat">Failed: <span id="s-fail">0</span></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="prog"></div>
  </div>

  <div id="result-list"></div>
</div>

</main>

<script>
const SCOPES = 'https://www.googleapis.com/auth/calendar.events';
const CAL_API = 'https://www.googleapis.com/calendar/v3/calendars/primary/events';

let accessToken = null;
let rowIdx = 0;

function fmtDate(d) {
  return d.toISOString().slice(0,10);
}

function signIn() {

  const clientId = document
    .getElementById('client-id')
    .value
    .trim();

  if (!clientId) {
    alert('Please enter client ID');
    return;
  }

  const params = new URLSearchParams({
    client_id: clientId,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: 'token',
    scope: SCOPES,
    prompt: 'consent'
  });

  const popup = window.open(
    'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString(),
    'auth',
    'width=500,height=650'
  );

  const timer = setInterval(() => {

    try {

      if (popup.location.hash.includes('access_token')) {

        const hash = new URLSearchParams(
          popup.location.hash.substring(1)
        );

        accessToken = hash.get('access_token');

        popup.close();

        clearInterval(timer);

        onAuthed(clientId);
      }

    } catch(e) {}

  }, 500);
}

function onAuthed(clientId) {

  document.getElementById('status-dot').classList.add('live');
  document.getElementById('status-text').textContent = 'connected';

  document.getElementById('section-events').classList.remove('hidden');
  document.getElementById('section-quick').classList.remove('hidden');

  document.getElementById('btn-signout').classList.remove('hidden');

  localStorage.setItem('gcal_client_id', clientId);

  if (document.querySelectorAll('.event-row').length === 0) {
    addRow();
  }
}

function signOut() {
  accessToken = null;

  document.getElementById('status-dot').classList.remove('live');
  document.getElementById('status-text').textContent = 'not connected';
}

function escHtml(s) {
  return s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function addRow(
  title='',
  date='',
  start='',
  end='',
  repeat=''
) {

  const id = rowIdx++;

  const div = document.createElement('div');

  div.className = 'event-row';

  div.id = 'row-' + id;

  div.innerHTML = `

    <input
      type="text"
      data-f="title"
      placeholder="Event title"
      value="${escHtml(title)}"
    />

    <input
      type="date"
      data-f="date"
      value="${date || fmtDate(new Date())}"
    />

    <input
      type="time"
      data-f="start"
      value="${start}"
    />

    <input
      type="time"
      data-f="end"
      value="${end}"
    />

    <select data-f="repeat">
      <option value="">No Repeat</option>
      <option value="daily" ${repeat==='daily'?'selected':''}>Daily</option>
      <option value="weekdays" ${repeat==='weekdays'?'selected':''}>Weekdays</option>
      <option value="weekly" ${repeat==='weekly'?'selected':''}>Weekly</option>
    </select>

    <button
      class="btn btn-danger"
      onclick="document.getElementById('row-${id}').remove()">
      ✕
    </button>
  `;

  document.getElementById('rows').appendChild(div);
}

function parseRows() {

  return Array
    .from(document.querySelectorAll('.event-row'))
    .map(row => ({

      title: row.querySelector('[data-f="title"]').value.trim(),
      date: row.querySelector('[data-f="date"]').value.trim(),
      start: row.querySelector('[data-f="start"]').value.trim(),
      end: row.querySelector('[data-f="end"]').value.trim(),
      repeat: row.querySelector('[data-f="repeat"]').value

    }));
}

function quickAddGym() {
  addRow('Morning Gym', fmtDate(new Date()), '06:30', '07:30', 'weekdays');
}

function quickAddStandup() {
  addRow('Daily Standup', fmtDate(new Date()), '09:00', '09:30', 'daily');
}

function quickAddStudy() {
  addRow('Study Session', fmtDate(new Date()), '20:00', '22:00', 'daily');
}

function quickAddLunch() {
  addRow('Lunch Break', fmtDate(new Date()), '13:00', '14:00', 'weekdays');
}

function quickAddSleep() {
  addRow('Sleep', fmtDate(new Date()), '23:00', '07:00', 'daily');
}

function generateWorkday() {
  quickAddGym();
  quickAddStandup();
  quickAddLunch();
  quickAddStudy();
}

function isDate(d) {
  return /^\d{4}-\d{2}-\d{2}$/.test(d);
}

function isTime(t) {
  return /^\d{2}:\d{2}$/.test(t);
}

function plusHour(t) {

  const [h,m] = t.split(':').map(Number);

  const total = h * 60 + m + 60;

  return String(Math.floor(total/60)%24).padStart(2,'0')
    + ':' +
    String(total%60).padStart(2,'0');
}

async function pushToCalendar() {

  if (!accessToken) {
    alert('Please connect Google account first');
    return;
  }

  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;

  const rows = parseRows();

  document.getElementById('section-results').classList.remove('hidden');

  document.getElementById('result-list').innerHTML = '';

  let ok = 0;
  let fail = 0;

  document.getElementById('s-total').textContent = rows.length;

  for (let i = 0; i < rows.length; i++) {

    const j = rows[i];

    if (!j.title || !isDate(j.date) || !isTime(j.start)) {
      fail++;
      continue;
    }

    const endTime = isTime(j.end)
      ? j.end
      : plusHour(j.start);

    const body = {

      summary: j.title,

      start: {
        dateTime: `${j.date}T${j.start}:00`,
        timeZone: tz
      },

      end: {
        dateTime: `${j.date}T${endTime}:00`,
        timeZone: tz
      }
    };

    if (j.repeat === 'daily') {
      body.recurrence = ['RRULE:FREQ=DAILY'];
    }

    else if (j.repeat === 'weekly') {
      body.recurrence = ['RRULE:FREQ=WEEKLY'];
    }

    else if (j.repeat === 'weekdays') {
      body.recurrence = [
        'RRULE:FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR'
      ];
    }

    try {

      const res = await fetch(CAL_API, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + accessToken,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {

        ok++;

        renderResult(
          j.title,
          `${j.date} ${j.start}-${endTime}`,
          'ok'
        );

      } else {

        fail++;

        renderResult(j.title, '', 'fail');
      }

    } catch(e) {

      fail++;

      renderResult(j.title, '', 'fail');
    }

    document.getElementById('s-ok').textContent = ok;
    document.getElementById('s-fail').textContent = fail;

    document.getElementById('prog').style.width =
      ((i + 1) / rows.length * 100) + '%';
  }
}

function renderResult(title, time, status) {

  const div = document.createElement('div');

  div.className = 'result-item';

  div.innerHTML = `
    <div class="result-title">${title}</div>
    <div>${time}</div>
    <div class="badge ${status === 'ok' ? 'badge-ok' : 'badge-fail'}">
      ${status}
    </div>
  `;

  document.getElementById('result-list').appendChild(div);
}

window.addEventListener('DOMContentLoaded', () => {

  const saved = localStorage.getItem('gcal_client_id');

  if (saved) {
    document.getElementById('client-id').value = saved;
  }

  addRow();
});
</script>

</body>
</html>
